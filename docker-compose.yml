services:
  api:
    build:
      context: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ${BIOPLATE_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  ui:
    build:
      context: .
    command: streamlit run app/ui/app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      - api
    env_file:
      - ${BIOPLATE_ENV_FILE:-.env}
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
