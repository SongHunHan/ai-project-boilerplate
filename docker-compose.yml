services:
  api:
    build:
      context: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ${BIOPLATE_ENV_FILE:-.env}
    ports:
      - "8000:8000"
    volumes:
      - ./app/__init__.py:/app/app/__init__.py
      - ./app/api:/app/app/api
      - ./src:/app/src
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ${BIOPLATE_ENV_FILE:-.env}
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./app/__init__.py:/app/app/__init__.py
      - ./app/ui:/app/app/ui
